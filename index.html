<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Fixture - Mundial 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #e11d48; margin-bottom: 5px; }
        .sub { color: #94a3b8; margin-bottom: 30px; }
        
        .seccion {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { color: #38bdf8; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-top: 0; }
        
        /* Estilos de Partidos */
        .partido {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .partido:last-child { border-bottom: none; }
        .equipo { width: 40%; font-weight: bold; }
        .marcador { width: 20%; font-size: 1.2rem; color: #f59e0b; font-weight: bold; }
        .estado { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }

        /* Estilos de Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; }
        th { background-color: #334155; color: #38bdf8; }
        tr:nth-child(even) { background-color: #1e293b; }
        tr:border-bottom { border-bottom: 1px solid #334155; }
        .pos-lider { color: #22c55e; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 MI FIXTURE PERSONAL</h1>
        <p class="sub">Mundial FIFA 2026 • Datos por Football-Data</p>

        <!-- SECCIÓN DE PARTIDOS -->
        <div class="seccion">
            <h2>📅 PARTIDOS DE HOY</h2>
            <div id="lista-partidos">Cargando partidos del día...</div>
        </div>

        <!-- SECCIÓN DE POSICIONES -->
        <div class="seccion">
            <h2>📊 POSICIONES EN TIEMPO REAL</h2>
            <div id="tabla-posiciones">Cargando clasificación de los grupos...</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Pega aquí la clave que te envíen por correo
        const API_KEY = "e0b11953e793466ea3ad7bf4942900ff"; 
        const WC_ID = "WC"; // Código oficial de Football-Data para la Copa del Mundo

        const opciones = {
            headers: { 'X-Auth-Token': API_KEY }
        };

        async function cargarFixtureMundial() {
async function cargarFixtureMundial() {
            try {
                const proxy = "https://cors-anywhere.herokuapp.com/";
                const urlBase = "https://api.football-data.org/v4/competitions/";

                // 1. Conseguir todos los partidos del Mundial (Lógica simplificada)
                const respuestaPartidos = await fetch(`${proxy}${urlBase}${WC_ID}/matches`, opciones);
                const datosPartidos = await respuestaPartidos.json();
                
                // Si la API no devuelve partidos hoy, tomamos los últimos disponibles del torneo para que no quede vacío
                let partidosParaMostrar = datosPartidos.matches;
                
                // Intentamos filtrar por la fecha actual
                const hoy = new Date().toISOString().split('T')[0];
                const filtradosHoy = datosPartidos.matches.filter(m => m.utcDate.startsWith(hoy));
                
                // Si hay partidos hoy, mostramos solo esos; si no, mostramos los más recientes del fixture
                if (filtradosHoy.length > 0) {
                    partidosParaMostrar = filtradosHoy;
                } else {
                    // Tomamos los últimos 4 partidos del torneo para rellenar la pantalla visualmente
                    partidosParaMostrar = datosPartidos.matches.filter(m => m.status === 'FINISHED' || m.status === 'IN_PLAY').slice(-4);
                }
                
                dibujarPartidos(partidosParaMostrar);

                // 2. Conseguir tabla de posiciones
                const respuestaTabla = await fetch(`${proxy}${urlBase}${WC_ID}/standings`, opciones);
                const datosTabla = await respuestaTabla.json();
                
                dibujarTablas(datosTabla.standings);

            } catch (error) {
                console.error("Error cargando los datos:", error);
                document.getElementById('lista-partidos').innerHTML = "Error al conectar con el servidor de datos.";
            }
        }

        // Ejecutar la carga al abrir la web
        cargarFixtureMundial();
    </script>
</body>
</html>
