<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Fixture - Mundial 2026</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #0f172a;
    color: #f8fafc;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: 0 auto;
}

h1 {
    color: #e11d48;
    margin-bottom: 5px;
}

.sub {
    color: #94a3b8;
    margin-bottom: 30px;
}

.seccion {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,.15);
}

h2 {
    color: #38bdf8;
    border-bottom: 1px solid #334155;
    padding-bottom: 8px;
    margin-top: 0;
}

.partido {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #334155;
}

.partido:last-child {
    border-bottom: none;
}

.equipo {
    width: 40%;
    font-weight: bold;
}

.marcador {
    width: 20%;
    color: #f59e0b;
    font-weight: bold;
}

.estado {
    color: #94a3b8;
    font-size: 0.8rem;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: #334155;
    color: #38bdf8;
}

tr {
    border-bottom: 1px solid #334155;
}

.pos-lider {
    color: #22c55e;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>🏆 MI FIXTURE PERSONAL</h1>
    <p class="sub">Mundial FIFA 2026 • Datos por Football-Data</p>

    <div class="seccion">
        <h2>📅 PARTIDOS DE HOY</h2>
        <div id="lista-partidos">
            Cargando partidos del día...
        </div>
    </div>

    <div class="seccion">
        <h2>📊 POSICIONES EN TIEMPO REAL</h2>
        <div id="tabla-posiciones">
            Cargando clasificación de los grupos...
        </div>
    </div>

</div>

<script>

const API_KEY = "e0b11953e793466ea3ad7bf4942900ff";
const WC_ID = "WC";

const opciones = {
    headers: {
        "X-Auth-Token": API_KEY
    }
};

function dibujarPartidos(partidos) {

    const contenedor = document.getElementById("lista-partidos");

    if (!partidos || partidos.length === 0) {
        contenedor.innerHTML = "No hay partidos disponibles.";
        return;
    }

    contenedor.innerHTML = partidos.map(partido => `
        <div class="partido">
            <div class="equipo">${partido.homeTeam?.name || "-"}</div>

            <div class="marcador">
                ${partido.score?.fullTime?.home ?? 0}
                -
                ${partido.score?.fullTime?.away ?? 0}
            </div>

            <div class="equipo">${partido.awayTeam?.name || "-"}</div>
        </div>

        <div class="estado">
            ${partido.status}
        </div>
    `).join("");
}

function dibujarTablas(tablas) {

    const contenedor = document.getElementById("tabla-posiciones");

    if (!tablas || tablas.length === 0) {
        contenedor.innerHTML = "No hay clasificación disponible.";
        return;
    }

    let html = "";

    tablas.forEach(grupo => {

        html += `
        <table>
            <thead>
                <tr>
                    <th>Equipo</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody>
        `;

        grupo.table.forEach((equipo, index) => {

            html += `
            <tr>
                <td class="${index === 0 ? 'pos-lider' : ''}">
                    ${equipo.team.name}
                </td>
                <td>${equipo.points}</td>
            </tr>
            `;
        });

        html += `
            </tbody>
        </table>
        <br>
        `;
    });

    contenedor.innerHTML = html;
}

async function cargarFixtureMundial() {

    try {

        const urlBase =
            "https://api.football-data.org/v4/competitions/";

        const respuestaPartidos =
            await fetch(`${urlBase}${WC_ID}/matches`, opciones);

        const datosPartidos =
            await respuestaPartidos.json();

        dibujarPartidos(datosPartidos.matches);

        const respuestaTabla =
            await fetch(`${urlBase}${WC_ID}/standings`, opciones);

        const datosTabla =
            await respuestaTabla.json();

        dibujarTablas(datosTabla.standings);

    } catch (error) {

        console.error(error);

        document.getElementById("lista-partidos").innerHTML =
            "❌ Error al cargar partidos";

        document.getElementById("tabla-posiciones").innerHTML =
            "❌ Error al cargar posiciones";
    }
}

cargarFixtureMundial();

</script>

</body>
</html>
